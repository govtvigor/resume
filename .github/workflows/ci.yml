name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build
        env:
          AUTH_SECRET: ci-build-placeholder-secret-min-32-chars
          AUTH_GOOGLE_ID: ci-placeholder
          AUTH_GOOGLE_SECRET: ci-placeholder
          MONGODB_URI: mongodb://ci-placeholder:27017/portfolio
          NEXT_PUBLIC_SITE_URL: https://example.com
